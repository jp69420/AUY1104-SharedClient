apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api-${COLOR}
  labels:
    app: demo-api
    color: ${COLOR}
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-api
      color: ${COLOR}
  template:
    metadata:
      labels:
        app: demo-api
        color: ${COLOR}
    spec:
      containers:
        - name: demo-api
          image: ghcr.io/jp69420/demo-api:ERROR_INTENCIONAL_123
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
